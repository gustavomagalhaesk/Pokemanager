services:
  - type: web
    name: minha-app-rails
    runtime: ruby
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec rails server"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rails-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: NODE_VERSION
        value: 24.14.0 # Ajuste conforme necessário

databases:
  - name: rails-db
    databaseName: rails_db
    user: rails_user